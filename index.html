<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca Organizadora</title>
    <style>
        /* Estilização Geral */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        /* Barra de Busca */
        .search-container {
            max-width: 600px;
            margin: -25px auto 30px;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px;
            border: none;
            border-radius: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            outline: none;
        }

        /* Grid de Livros */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card do Livro */
        .book-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-10px);
        }

        .book-cover {
            height: 300px;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #777;
            background-size: cover;
            background-position: center;
        }

        .book-info {
            padding: 20px;
        }

        .book-title {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .book-author {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-read { background: #d4edda; color: #155724; }
        .status-reading { background: #fff3cd; color: #856404; }

    </style>
</head>

<script>
    function filterBooks() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('book-card');

        for (let i = 0; i < cards.length; i++) {
            const title = cards[i].getAttribute('data-title').toLowerCase();
            const author = cards[i].getAttribute('data-author').toLowerCase();
            
            if (title.includes(input) || author.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }
</script>
